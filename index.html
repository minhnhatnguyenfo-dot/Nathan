<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sotetsu Grand Fresa Saigon</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;

    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url('bg.jpg') no-repeat center center/cover;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    text-align: center;
    width: 600px;
    max-width: 90%;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    color: white;
    font-weight: 400;
    font-size: 38px;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* Subtitle */
.sub {
    color: #ddd;
    font-size: 14px;
    margin-bottom: 10px;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 70px;
}

/* Button */
button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;

    padding: 18px;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;

    background: rgba(31, 42, 68, 0.6);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.15);

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    box-shadow: 0 4px 20px rgba(0,0,0,0.3);

    transition: all 0.25s ease;
}

button:hover {
    background: rgba(31, 42, 68, 0.85);
    transform: translateY(-3px);
}

.icon {
    font-size: 18px;
}

/* 🌟 INFO BAR */
.info-bar {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;

    padding: 12px 25px;
    border-radius: 14px;

    background: rgba(20, 25, 40, 0.55);
    color: white;
    font-size: 14px;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 6px 25px rgba(0,0,0,0.4);
}

.info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 15px;
}

.divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.3);
}

/* Icon màu */
.icon-clock { color: #4fc3f7; }      /* xanh dương */
.icon-nosmoke { color: #ef5350; }    /* đỏ */
.icon-wifi { color: #66bb6a; }       /* xanh lá */

</style>
</head>

<body>

<div class="container">
    <h1>How can we assist you today?</h1>
    <div class="sub">Thank you for staying with us</div>

    <div class="buttons">
        <button onclick="go1()">
            <span class="icon">📝</span>
            Your Experience
        </button>

        <button onclick="go2()">
            <span class="icon">🎁</span>
            Discount
        </button>

        <button onclick="go3()">
            <span class="icon">📍</span>
            Facilities & Services
        </button>

        <button onclick="go4()">
            <span class="icon">📖</span>
            Discover Saigon
        </button>
    </div>
</div>

<!-- 🌟 INFO BAR -->
<div class="info-bar">

    <div class="info-item">
        <span class="icon icon-clock">⏰</span>
        Check-out: 12:00 PM
    </div>

    <div class="divider"></div>

    <div class="info-item">
        <span class="icon icon-nosmoke">🚭</span>
        Non-smoking
    </div>

    <div class="divider"></div>

    <div class="info-item">
        <span class="icon icon-wifi">📶</span>
        Wifi code: Sotetsux
    </div>

</div>

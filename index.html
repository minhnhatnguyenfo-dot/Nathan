<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Sotetsu Grand Fresa Saigon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;

    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('bg.jpg') no-repeat center center/cover;

    min-height: 100vh;
    min-height: 100dvh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    text-align: center;
    width: 600px;
    max-width: 92%;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    color: white;
    font-weight: 400;
    font-size: 38px;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* Subtitle */
.sub {
    color: #ddd;
    font-size: 14px;
    margin-bottom: 10px;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 70px;
}

/* Button */
button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;

    padding: 18px;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;

    background: rgba(31, 42, 68, 0.6);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.15);

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    box-shadow: 0 4px 20px rgba(0,0,0,0.3);

    transition: all 0.25s ease;
}

button:hover {
    background: rgba(31, 42, 68, 0.85);
    transform: translateY(-3px);
}

.icon {
    font-size: 18px;
}

/* =========================
   INFO BAR (FIX FULL + WIFI)
========================= */
.info-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;

    gap: 10px;

    padding: 12px 18px;
    border-radius: 14px;

    background: rgba(20, 25, 40, 0.55);
    color: white;
    font-size: 14px;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 6px 25px rgba(0,0,0,0.4);

    max-width: 95%;
}

.info-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
}

.divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.3);
}

/* =========================
   📱 MOBILE FIX
========================= */
@media (max-width: 768px) {

    body {
        align-items: flex-start;
        padding-top: 40px;
    }

    .container {
        width: 95%;
    }

    h1 {
        font-size: 30px;
    }

    .sub {
        font-size: 14px;
    }

    .buttons {
        grid-template-columns: 1fr;
        gap: 14px;
        margin-top: 30px;
    }

    button {
        font-size: 20px;
        padding: 22px;
    }

    .icon {
        font-size: 22px;
    }

    /* INFO BAR MOBILE FIX */
    .info-bar {
        bottom: 10px;
        width: 92%;
        font-size: 12px;
        padding: 10px 12px;
    }

    .info-item {
        padding: 0 6px;
    }

    .divider {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>How can we assist you today?</h1>
    <div class="sub">Thank you for staying with us</div>

    <div class="buttons">
        <button onclick="go1()">
            <span class="icon">📝</span>
            Your Experience
        </button>

        <button onclick="go2()">
            <span class="icon">🎁</span>
            Discount
        </button>

        <button onclick="go3()">
            <span class="icon">📍</span>
            Facilities & Services
        </button>

        <button onclick="go4()">
            <span class="icon">📖</span>
            Discover Saigon

    </div>
</div>

<!-- INFO BAR (ĐÃ FIX + WIFI) -->

    <div class="divider"></div>
    <div class="info-item">🚭 Non-smoking</div>
    <div class="divider"></div>
    <div class="info-item">📶 WiFi: Sotetsux</div>
</div>
